{% extends "base.html" %}

{% block content %}

<style>
.estado {
    padding: 5px 10px;
    border-radius: 10px;
    color: white;
    font-size: 12px;
    font-weight: bold;
}

.estado.disponible {
    background-color: #28a745;
}

.estado.en-uso {
    background-color: #007bff;
}

.estado.mantenimiento {
    background-color: #ffc107;
    color: black;
}

.estado.depreciado {
    background-color: #dc3545;
}

/* Agrega más si hay otros estados, por ejemplo: */
.estado.activo {
    background-color: #007bff;  /* Asumiendo que "Activo" es similar a "En uso" (azul) */
}

.estado.entrada {
    background-color: #28a745;  /* Verde para "Entrada" si es similar a "Disponible" */
}

.estado.traslado {
    background-color: #ffc107;  /* Amarillo para "Traslado" */
    color: black;
}

.estado.retiro {
    background-color: #dc3545;  /* Rojo para "Retiro" */
}
</style>

<h2 style="color:#004080; margin-bottom:20px;">Búsqueda de activos</h2>

<div style="background:white; padding:20px; border-radius:15px; margin-bottom:20px;">

    <form method="POST" style="display:flex; gap:10px;">
        <input type="text" name="busqueda" placeholder="Buscar por código o nombre"
               style="flex:1; padding:10px; border-radius:10px; border:1px solid #ccc;">
        
        <button style="background:#0056A6; color:white; border:none; padding:10px 20px; border-radius:10px;">
            Buscar
        </button>
    </form>

</div>

<div style="background:white; border-radius:15px; overflow:hidden;">

    <div style="background:#0056A6; color:white; padding:12px;">
        Resultados
    </div>

    <table style="width:100%; border-collapse:collapse;">

        <tr style="background:#f2f2f2;">
            <th style="padding:10px;">Código</th>
            <th>Serie</th>
            <th>Nombre</th>
            <th>Área</th>
            <th>Responsable</th>
            <th>Estado</th>
        </tr>

        {% for r in resultados %}
        <tr style="text-align:center;">
            <td style="padding:10px;">{{ r.codigo }}</td>
            <td>{{ r.serie }}</td>
            <td>{{ r.nombre }}</td>
            <td>{{ r.nombre_area }}</td>
            <td>{{ r.responsable }}</td>
            <td>
                <span class="estado {{ r.estado|lower|replace(' ', '-') }}">
                    {{ r.estado }}
                </span>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
