{% extends "base.html" %}

{% block content %}

<h2 class="titulo">Gestión de activos</h2>

<table class="tabla-bonita">

    <thead>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Área</th>
            <th>Responsable de gestión</th>
            <th>Estado</th>
            <th>Detalle</th>
        </tr>
    </thead>

    <tbody>
        {% for a in activos %}
        <tr>
            <td>{{ a.codigo }}</td>
            <td>{{ a.nombre }}</td>
            <td>{{ a.nombre_area }}</td>
            <td>{{ session.usuario }}</td>
            <td>
                <span class="estado {{ a.estado|lower|replace(' ', '-') }}">
                    {{ a.estado }}
                </span>
            </td>
            <td>
                <a href="{{ url_for('gestion.detalle_activo', codigo=a.codigo) }}" class="btn-detalle">Ver</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>

</table>

<style>

.titulo {
    color: #0056A6;
    margin-bottom: 20px;
}

.tabla-bonita {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 15px;
    overflow: hidden;
}

.tabla-bonita thead {
    background-color: #0056A6;
    color: white;
}

.tabla-bonita th {
    padding: 12px;
    text-align: left;
}

.tabla-bonita td {
    padding: 10px;
    background: white;
    border-bottom: 1px solid #ddd;
}

.tabla-bonita tr:hover td {
    background-color: #f5f5f5;
}

.btn-detalle {
        background-color: #004683;
        color: white;
        padding: 6px 12px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;
        display: inline-block;
        transition: background-color 0.2s ease;
    }

    .btn-detalle:hover {
        background-color: #00305a;
}

.estado {
    padding: 5px 10px;
    border-radius: 10px;
    color: white;
    font-size: 12px;
}

.estado.disponible {
    background-color: #28a745;
}

.estado.en-uso {
    background-color: #007bff;
}

.estado.mantenimiento {
    background-color: #ffc107;
    color: black;
}

.estado.depreciado {
    background-color: #dc3545;
}

</style>

{% endblock %}
