<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login UFG</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #00264d, #004080); 
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .login-container {
      background: #ffffff;
      padding: 45px;
      border-radius: 18px;
      box-shadow: 0px 12px 30px rgba(0,0,0,0.35);
      width: 400px;
      animation: fadeIn 1s ease-in-out;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centra todo dentro de la tarjeta blanca */
    }

    .login-container img {
      width: 420px; 
      display: block;
      margin: 0 auto 30px auto;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #004080;
      font-size: 24px;
    }

    .login-container form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%; /* Asegura que el formulario ocupe el espacio para centrar a sus hijos */
    }

    /* Regla unificada para inputs, botón y alertas para que midan exactamente lo mismo */
    .login-container input,
    .login-container button,
    .alert {
      width: 100%;
      max-width: 320px; /* Este es el ancho maestro */
      box-sizing: border-box; /* Esto evita que el padding rompa el ancho total */
    }

    .login-container input {
      padding: 14px;
      margin: 12px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      text-align: center; 
    }

    .login-container button {
      padding: 14px;
      margin-top: 12px;
      background: #004080;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-container button:hover {
      background: #0066cc;
      transform: scale(1.03);
    }

    /* Estilos corregidos de la alerta */
    .alert {
      background: #ffe6e6;
      color: #a00;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 14px;
      /* Se eliminó el padding extra que la hacía más grande */
    }
    
    .alert p {
        margin: 5px 0; /* Limpia los márgenes por defecto de la etiqueta P */
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Contenedor relativo solo para el input de la contraseña */
    .password-wrapper {
        position: relative; 
        width: 100%; 
        max-width: 320px; 
        margin: 12px 0;
    }

    /* Sobrescribe el margen del input de password para que no se sume al del wrapper */
    .password-wrapper input {
        margin: 0;
        padding-right: 40px; /* Espacio para el ojito */
    }

    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s;
      width: 24px;
      height: 24px;
    }
    .password-toggle:hover {
      color: #333;
    }
    .password-toggle svg {
      position: absolute;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .password-toggle .eye-open {
      opacity: 0;
      transform: scale(0.5) rotate(-45deg);
    }
    .password-toggle .eye-closed {
      opacity: 1;
      transform: scale(1) rotate(0);
    }
    .password-toggle.show-pwd .eye-open {
      opacity: 1;
      transform: scale(1) rotate(0);
    }
    .password-toggle.show-pwd .eye-closed {
      opacity: 0;
      transform: scale(1.5) rotate(45deg);
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo UFG">
    
    <h2>Bienvenido</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert">
          {% for msg in messages %}
            <p>{{ msg }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <input type="text" name="usuario" placeholder="Usuario" required>
      
      <div class="password-wrapper">
        <input type="password" name="password" id="password" placeholder="Contraseña" required>
        <div id="togglePassword" class="password-toggle" title="Mostrar/Ocultar contraseña">
          <svg class="eye-closed" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
          <svg class="eye-open" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </div>
      </div>

      <button type="submit">Ingresar</button>
    </form>

    <script>
      const togglePassword = document.getElementById('togglePassword');
      const password = document.getElementById('password');

      togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('show-pwd');
      });
    </script>

  </div>

</body>
</html>
